name: Build Multi Melon Swift IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Biên dịch Code Swift sang ARM64 iOS
      run: |
        # Lấy đường dẫn SDK iOS trên máy ảo Mac
        SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        # Biên dịch file main.swift thành file thực thi nhị phân ARM64
        # Liên kết với MobileCoreServices để dùng các hàm quét ứng dụng hệ thống
        swiftc -sdk $SDKPATH -target arm64-apple-ios15.0 -framework MobileCoreServices src/main.swift -o Payload/MultiMelon.app/MultiMelon

   - name: Ký giả lập (Ad-hoc Sign) để tránh crash
      run: |
        # Bỏ phần --entitlements /dev/null đi để macOS không bị lỗi đọc file
        codesign --force --sign - Payload/MultiMelon.app/MultiMelon

    - name: Đóng gói thành file IPA
      run: |
        zip -r MultiMelon.ipa Payload/

    - name: Tải file IPA lên GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MultiMelon-Swift-Build
        path: MultiMelon.ipa
